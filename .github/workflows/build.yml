name: Build with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GHIDRA_VERSION: 12.0
      GHIDRA_DATE: 20251205

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Download Ghidra
      run: |
        wget --no-verbose -O ghidra.zip https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_${{ env.GHIDRA_VERSION }}_build/ghidra_${{ env.GHIDRA_VERSION }}_PUBLIC_${{ env.GHIDRA_DATE }}.zip
        7z x -bd ghidra.zip

    - name: Set GHIDRA_INSTALL_DIR
      run: echo "GHIDRA_INSTALL_DIR=$PWD/ghidra_${{ env.GHIDRA_VERSION }}_PUBLIC/Ghidra" >> $GITHUB_ENV

    - name: Install Gradle (via sdkman)
      run: |
        curl -s "https://get.sdkman.io" | bash
        source "$HOME/.sdkman/bin/sdkman-init.sh"
        sdk install gradle 8.6.2

    - name: Build with Gradle
      run: |
        echo "Using GHIDRA_INSTALL_DIR=$GHIDRA_INSTALL_DIR"
        gradle -PGHIDRA_INSTALL_DIR="$GHIDRA_INSTALL_DIR" clean build

    - name: Assemble release directory
      run: |
        mkdir -p release
        zipfile=$(find . -type f -name '*.zip' | head -n1)
        if [ -z "$zipfile" ]; then
          echo "No zip artifact found"
          exit 1
        fi
        cp "$zipfile" release/
        cp bridge_mcp_ghidra.py release/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: GhidraMCP-artifact
        path: release/*
